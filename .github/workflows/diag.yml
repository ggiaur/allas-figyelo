name: Diagnosztika

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - env:
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: python test_diag.py > docs/diag.json
      - run: |
          git config user.name "diag-bot"
          git config user.email "actions@github.com"
          git add docs/diag.json
          git commit -m "diag" || true
          git push
